# Apply real secrets with: kubectl create secret generic gateway-secrets ...
# This file documents the keys; NEVER commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: ai-gateway
type: Opaque
stringData:
  ConnectionStrings__Postgres: "Host=postgres;Database=gateway;Username=gateway;Password=REPLACE"
  ConnectionStrings__Redis: "redis:6379"
  ConnectionStrings__RabbitMq: "amqp://gateway:REPLACE@rabbitmq:5672"
  Jwt__SigningKey: "REPLACE-with-32+-byte-random-secret"
  Anthropic__ApiKey: "sk-ant-REPLACE-your-single-org-key"   # server-only, never shipped to clients
