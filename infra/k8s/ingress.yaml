apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-gateway-ingress
  namespace: ai-gateway
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"        # SSE streaming
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [ai-gateway.yourcompany.com]
      secretName: ai-gateway-tls
  rules:
    - host: ai-gateway.yourcompany.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway-api, port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: frontend, port: { number: 3000 } } }
