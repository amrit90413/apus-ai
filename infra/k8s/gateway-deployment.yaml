apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: ai-gateway
spec:
  replicas: 3                      # stateless → scale horizontally; quota state lives in Redis
  selector:
    matchLabels: { app: gateway-api }
  template:
    metadata:
      labels: { app: gateway-api }
    spec:
      containers:
        - name: gateway-api
          image: ghcr.io/yourcompany/gateway-api:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - secretRef: { name: gateway-secrets }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: ai-gateway
spec:
  selector: { app: gateway-api }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-api-hpa
  namespace: ai-gateway
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: gateway-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
