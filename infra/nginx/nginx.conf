worker_processes auto;
events { worker_connections 4096; }

http {
  upstream gateway { server gateway-api:8080; }
  upstream web     { server frontend:3000; }

  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  # ── Unified entry (local dev: localhost:8080) ─────────────────────────────
  server {
    listen 80;
    server_name _;

    location /api/v1/chat/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://gateway;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / { proxy_pass http://web; }
  }

  # ── Production backend — port 9001 ────────────────────────────────────────
  server {
    listen 9001;
    server_name _;

    location /v1/chat/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://gateway;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── Production frontend — port 9002 ───────────────────────────────────────
  server {
    listen 9002;
    server_name _;

    location /api/v1/chat/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://gateway;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / { proxy_pass http://web; }
  }
}
