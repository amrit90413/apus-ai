worker_processes auto;
events { worker_connections 4096; }

http {
  upstream gateway { server gateway-api:8080; }
  upstream web     { server frontend:3000; }

  # Rate limit at the edge as defense-in-depth (Redis quota engine is the real limiter).
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  server {
    listen 80;
    server_name _;

    # SSE streaming needs buffering OFF so tokens flush to the CLI immediately.
    location /api/v1/chat/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://gateway;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / { proxy_pass http://web; }
  }
}
