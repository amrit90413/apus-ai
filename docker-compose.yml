services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5436:5432"     # external access; 5432/5433/5435 taken by other projects
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: gateway
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-devpassword}
    ports:
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - chdata:/var/lib/clickhouse
      - ./infra/db/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      retries: 10

  gateway-api:
    build: { context: ./backend, dockerfile: Dockerfile }
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets gateway reach WhatsApp bot on host ports 3000-3003
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=gateway;Username=gateway;Password=${POSTGRES_PASSWORD:-devpassword}"
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__RabbitMq: "amqp://gateway:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672"
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-change-me-min-32-bytes-long-secret-key}
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-}   # optional — set via super-admin dashboard instead
      WhatsApp__BotUrl: ${WHATSAPP_BOT_URL:-http://host.docker.internal:3000}
      WhatsApp__ApiKey: ${WHATSAPP_BOT_API_KEY:-sahil90413}
      ConnectionStrings__ClickHouseHttp: "http://clickhouse:8123"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  analytics-worker:
    build: { context: ./backend, dockerfile: Dockerfile.worker }
    environment:
      ConnectionStrings__RabbitMq: "amqp://gateway:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672"
      ConnectionStrings__ClickHouse: "Host=clickhouse;Port=8123;Database=default"
    depends_on:
      rabbitmq: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    environment:
      GATEWAY_URL: "http://gateway-api:8080"
    depends_on: [gateway-api]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9001:9001"     # production backend API
      - "9002:9002"     # production frontend
      # NOTE: 8080 is reserved by Jenkins on the host — do not bind it here
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [gateway-api, frontend]

volumes:
  pgdata:
  redisdata:
  chdata:
